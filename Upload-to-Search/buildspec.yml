version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.11
  build:
    commands:
      - pip install -r Upload-to-Search/requirements.txt -t Upload-to-Search/
      - aws cloudformation package --template-file Upload-to-Search/upload-to-search.yaml --s3-bucket codepipeline-us-east-1-66843b3dcf90-47f6-a5e2-120b13d644c9 --output-template-file upload.yaml

artifacts:
  type: zip
  files:
    - upload.yaml
    - Upload-to-Search/**/*