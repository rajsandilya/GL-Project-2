version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.11
  build:
    commands:
      - pip install -r "Upload to search/requirements.txt" -t "Upload to search"/
      - aws cloudformation package --template-file "Upload to search/upload-to-search.yaml" --s3-bucket artifacts-bucket-gl --output-template-file upload.yaml

artifacts:
  type: zip
  files:
    - upload.yaml
    - "Upload to search/**/*"